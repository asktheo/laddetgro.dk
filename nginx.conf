server {
    listen 80;
    server_name laddetgro.dk www.laddetgro.dk;

    root /var/www/www.laddetgro.dk;
    index index.html;

    # Serve static files directly when they exist, otherwise fall back to index.html for the SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Allow robots.txt and sitemap.xml to be served directly
    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    # Static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|json|xml|txt)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
    }

    # Protect against common exploits
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    error_page 404 /index.html;
}
