<svg xmlns="http://www.w3.org/2000/svg"
     width="512"
     height="512"
     viewBox="0 0 512 512">

  <!-- Farve -->
  <defs>
    <style>
      .olive {
        stroke: #556B2F;
        fill: none;
      }
      .text {
        fill: #556B2F;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 54px;
        letter-spacing: 0.12em;
      }
    </style>
  </defs>

  <!-- Ydre ramme -->
  <rect x="16" y="16" width="480" height="480"
        stroke-width="8"
